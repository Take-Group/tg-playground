name: tg-playground-backend

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tg_playground
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
      BIND_ON_IP: 0.0.0.0
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "--address", "127.0.0.1:7233", "operator", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8233:8080"
    depends_on:
      temporal:
        condition: service_healthy

  migrations:
    build:
      context: .
      target: migrations
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tg_playground
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tg_playground
      REDIS_URL: redis://redis:6379/0
      TEMPORAL_HOST: temporal:7233
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      target: worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tg_playground
      REDIS_URL: redis://redis:6379/0
      TEMPORAL_HOST: temporal:7233
    volumes:
      - ./app:/app/app
    depends_on:
      temporal:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

volumes:
  pgdata:
